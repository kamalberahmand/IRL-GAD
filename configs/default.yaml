# Default hyperparameters shared across all benchmarks.
# Override per-dataset in dataset-specific YAML files.

dataset:
  name: cora
  root: ./data
  anomaly_ratio: 0.05
  anomaly_type: structural
  seed: 0

model:
  hidden_dim: 256
  num_heads: 8
  num_layers: 2          # K
  dropout: 0.1
  reward_hidden: 256
  use_temporal_reward: true
  structural_extra: 4
  beta: 0.10             # MaxEnt temperature
  gamma: 1.0
  svi_iterations: 5
  use_str: true
  use_sem: true
  use_tmp: true
  score_mode: irl

training:
  epochs: 200
  lr: 1.0e-3
  weight_decay: 1.0e-4
  early_stop_patience: 50
  log_every: 10
  seed: 0
  out_dir: ./experiments/runs
  val_frac: 0.10
