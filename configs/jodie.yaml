# Dynamic interaction graph (JODIE/Wikipedia by default).
dataset:
  name: jodie
  root: ./data
  anomaly_ratio: 0.0
  anomaly_type: temporal
  seed: 0

model:
  hidden_dim: 256
  num_heads: 8
  num_layers: 2
  dropout: 0.1
  reward_hidden: 256
  use_temporal_reward: true
  structural_extra: 4
  beta: 0.10
  gamma: 1.0
  svi_iterations: 5

training:
  epochs: 200
  lr: 1.0e-3
  weight_decay: 1.0e-4
  early_stop_patience: 50
  log_every: 10
  seed: 0
