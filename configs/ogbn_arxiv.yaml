# Large-scale benchmark — synthetic anomalies on top of OGB citation graph.
dataset:
  name: ogbn_arxiv
  root: ./data
  anomaly_ratio: 0.05
  anomaly_type: structural
  seed: 0

model:
  hidden_dim: 256
  num_heads: 8
  num_layers: 2
  dropout: 0.1
  reward_hidden: 256
  use_temporal_reward: false
  structural_extra: 4
  beta: 0.10
  gamma: 1.0
  svi_iterations: 5

training:
  epochs: 100               # large graph -> fewer epochs
  lr: 5.0e-4
  weight_decay: 1.0e-4
  early_stop_patience: 20
  log_every: 5
  seed: 0
